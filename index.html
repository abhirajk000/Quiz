<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Tense Translation Master</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<button class="theme-toggle-btn" onclick="toggleTheme()" id="themeToggleBtn" title="Toggle theme">
    <i id="iconMoon" class="fa-solid fa-moon"></i>
    <i id="iconSun" class="fa-solid fa-sun"></i>
</button>

<button class="speaker-toggle-btn" onclick="toggleSpeaker()" id="speakerToggleBtn" title="Toggle Hindi audio">
    <i id="iconSpeaker" class="fa-solid fa-volume-high"></i>
    <i id="iconMuted" class="fa-solid fa-volume-xmark"></i>
</button>

<div class="app-container" id="setupContainer">

    <div class="setup-hero">
        <h1 class="setup-title">Translation Quiz</h1>
    </div>

    <!-- Questions + Timer: each on its own single line -->
       <div class="setup-field full-width">
        <div class="inline-label-row">
            <label class="field-label">Questions : </label>
            <div class="pill-group" id="qCountPills">
                <button class="pill" onclick="setPill(this,'questionCountInput','qCountPills',20)">20</button>
                <button class="pill active" onclick="setPill(this,'questionCountInput','qCountPills',30)">30</button>
                <button class="pill" onclick="setPill(this,'questionCountInput','qCountPills',40)">40</button>
                <button class="pill" onclick="setPill(this,'questionCountInput','qCountPills',60)">60</button>

            </div>
            <input type="number" id="questionCountInput" value="30" min="5" max="500">
        </div>
    </div>
    <div class="setup-field full-width timer-field">
        <div class="inline-label-row">
            <label class="field-label">Timer :</label>
            <div class="pill-group" id="timerPills">
                <button class="pill" onclick="setPill(this,'timerInput','timerPills',30)">30s</button>
                <button class="pill" onclick="setPill(this,'timerInput','timerPills',45)">45s</button>
                <button class="pill active" onclick="setPill(this,'timerInput','timerPills',60)">60s</button>
                <button class="pill active" onclick="setPill(this,'timerInput','timerPills',80)">80s</button>

            </div>
            <input type="number" id="timerInput" value="60" min="5" max="300">
        </div>
    </div>
  

    <!-- Topic -->
    <div class="setup-field full-width">
        <label class="field-label">Choose Topic</label>
        <select id="fileSelect" onchange="loadCategories()" class="setup-select">
            <option value="">Loading...</option>
        </select>
    </div>

    <!-- Categories -->
    <div id="categorySection" class="setup-field full-width">
        <div class="cat-header">
            <label class="field-labell">Categories</label>
            <button type="button" id="selectAllBtn" class="cat-toggle-btn" onclick="toggleAllCategories()">
                <span id="selectAllIcon">☑</span> All
            </button>
        </div>
        <div id="categoryCheckboxes" class="category-checkboxes-new"></div>
    </div>

    <button id="startBtn" onclick="initializeQuiz()" class="start-btn">
        <span>Start Practice</span>
        <span class="btn-arrow">→</span>
    </button>

</div>

<div class="app-container" id="quizContainer">
    <div class="stats-bar">
        <div class="stat-badge score-display" id="scoreDisplay">
            <span>✓</span>
            <span>Score: 0</span>
        </div>
        <div class="stat-badge streak-display" id="streakDisplay">
            <span>🔥</span>
            <span>Streak: 0</span>
        </div>
        <div class="stat-badge timer-display" id="timerDisplay">
            <span>⏱</span>
            <span>60s</span>
        </div>
    </div>
    
    <h2 id="mainTitle">Translate</h2>
    
    <div class="progress-container"><div class="progress-bar" id="progressBar"></div></div>
    <div id="progress-text">Question 1 / 30</div>
    
    <div id="question" onclick="speakCurrentHindi()" title="🔊 Click to replay Hindi">Loading...</div>
    <div id="hintText" class="hint-text"></div>

    <!-- ===== INPUT + MIC BUTTON ===== -->
    <div class="input-wrapper">
        <input type="text" id="userAnswer" placeholder="Type OR speak your English translation..." autocomplete="off">
        <button class="mic-btn" id="micBtn" onclick="toggleSpeech()" title="Press M to speak">
            <i id="micIcon" class="fa-solid fa-microphone"></i>
            <i id="micStopIcon" class="fa-solid fa-stop"></i>
        </button>
    </div>
    <div class="speech-status" id="speechStatus"></div>
    <!-- ============================== -->
    
    <div class="action-buttons">
        <button id="hintBtn" onclick="showCategoryHint()">💡 Show Category</button>
    </div>
    
    <button id="checkBtn" onclick="checkAnswer()">Check Answer (Enter)</button>
    <div id="feedback"></div>
    <button id="nextBtn" onclick="nextQuestion()">Next Question (Space)</button>
    
    <div id="reviewSection">
        <h3 class="review-title">Your Mistakes:</h3>
        <div id="reviewList"></div>
    </div>
    
    <button id="reviewBtn" onclick="showReviewScreen()">Review Mistakes</button>
    <button id="retryBtn" onclick="retryMistakes()">Retry Wrong Answers</button>
    <button id="restartBtn" onclick="returnToSetup()">Change Topic / Name</button>
</div>

<script src="script.js"></script>

</body>
</html>
